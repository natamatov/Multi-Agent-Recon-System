name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Ruff
        run: ruff check . --exclude scratch

      - name: Mypy
        run: mypy core app.py main.py --ignore-missing-imports

      - name: Pytest
        run: pytest tests/ -q --ignore=tests/test_swarm.py -x
